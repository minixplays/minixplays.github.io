<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSR Maker - Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Light Theme */
        body {
            background: linear-gradient(135deg, #fefbf6 0%, #fdf5e1 50%, #fae5ac 100%);
            color: #242424;
        }

        /* Dark Theme */
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #f1f5f9;
            color-scheme: dark;
        }

        .dashboard-container {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        body.dark-mode .dashboard-container {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(148, 163, 184, 0.3);
        }

        .card-item {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .card-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.06);
        }

        body.dark-mode .card-item {
            background: #1e293b;
            border-color: rgba(148, 163, 184, 0.2);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.3);
        }

        input, select {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode input,
        body.dark-mode select {
            background: #0f172a;
            color: #f1f5f9;
            border-color: #475569;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f4c74a;
            box-shadow: 0 0 0 3px rgba(244, 199, 74, 0.1);
        }

        body.dark-mode input:focus,
        body.dark-mode select:focus {
            border-color: #f4c74a;
            box-shadow: 0 0 0 3px rgba(244, 199, 74, 0.2);
        }

        body.dark-mode table {
            color: #f1f5f9;
        }

        body.dark-mode tbody tr {
            border-color: #475569;
        }

        .btn-primary {
            background: #f4c74a;
            color: #0f172a;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #ca9e2b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #242424;
            color: #ffffff;
            transition: all 0.3s;
        }

        body.dark-mode .btn-secondary {
            background: #f1f5f9;
            color: #0f172a;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: #ffffff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .summary-stat {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        body.dark-mode .summary-stat {
            background: #1e293b;
            border-color: rgba(148, 163, 184, 0.2);
        }
    </style>
</head>
<body class="py-4 sm:py-6 px-2 sm:px-4 md:px-6 min-h-screen">

    <div class="max-w-[1440px] mx-auto relative">
        
        <!-- Dashboard Container -->
        <div class="dashboard-container rounded-[2.5rem] sm:rounded-[3rem] p-4 sm:p-8 md:p-10 border border-white/60 min-h-[92vh] flex flex-col">
            
            <!-- Header with Back Button -->
            <div class="flex items-center justify-between mb-8 gap-4">
                <button onclick="goBack()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white border border-neutral-100 text-neutral-600 hover:text-[#242424] hover:bg-neutral-50 transition shadow-sm font-semibold text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Dashboard
                </button>
                <h1 class="text-2xl font-bold text-[#242424]">Daily Sales Report</h1>
                <div class="w-24"></div>
            </div>

            <!-- DSR Entry Form -->
            <div class="card-item rounded-2xl p-6 mb-6">
                <h2 class="text-lg font-bold mb-4">Create Daily Sales Report</h2>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Date</label>
                        <input type="date" id="saleDate" class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Product</label>
                        <input type="text" id="product" placeholder="e.g., Suit" class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Qty Sold</label>
                        <input type="number" id="qtySold" placeholder="0" class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Sale Amount</label>
                        <input type="number" id="saleAmount" placeholder="0.00" step="0.01" class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
                    </div>
                    <div class="flex items-end">
                        <button onclick="addSale()" class="w-full px-4 py-2 btn-primary rounded-lg font-bold">Add Sale</button>
                    </div>
                </div>
            </div>

            <!-- Sales Table -->
            <div class="card-item rounded-2xl p-6 mb-6 flex-grow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">Today's Sales</h2>
                    <button onclick="clearAllSales()" class="px-4 py-2 btn-danger rounded-lg font-semibold text-sm">Clear All</button>
                </div>
                
                <div class="overflow-x-auto rounded-lg border border-white/40">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/40 border-b border-white/40">
                                <th class="py-3 px-4 font-bold text-sm">S.No</th>
                                <th class="py-3 px-4 font-bold text-sm">Date</th>
                                <th class="py-3 px-4 font-bold text-sm">Product</th>
                                <th class="py-3 px-4 font-bold text-sm text-right">Quantity</th>
                                <th class="py-3 px-4 font-bold text-sm text-right">Amount</th>
                                <th class="py-3 px-4 font-bold text-sm text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody">
                            <!-- Sales entries rendered here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="summary-stat">
                    <p class="text-xs font-semibold text-neutral-500 uppercase tracking-widest mb-2">Total Transactions</p>
                    <h3 id="totalTransactions" class="text-3xl font-bold">0</h3>
                </div>
                <div class="summary-stat">
                    <p class="text-xs font-semibold text-neutral-500 uppercase tracking-widest mb-2">Total Quantity</p>
                    <h3 id="totalQuantity" class="text-3xl font-bold">0</h3>
                </div>
                <div class="summary-stat bg-amber-50">
                    <p class="text-xs font-semibold text-amber-700 uppercase tracking-widest mb-2">Total Sales</p>
                    <h3 id="totalSales" class="text-3xl font-bold text-amber-900">₹ 0.00</h3>
                </div>
                <div class="summary-stat">
                    <p class="text-xs font-semibold text-neutral-500 uppercase tracking-widest mb-2">Avg Sale Value</p>
                    <h3 id="avgSale" class="text-3xl font-bold">₹ 0.00</h3>
                </div>
            </div>
        </div>

        <div class="mt-6 text-center text-neutral-400 text-[10px] font-black uppercase tracking-widest">
            Daily Sales Report - Manager &copy; 2026
        </div>
    </div>

    <script>
        let salesData = [];

        // Set today's date
        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('saleDate').value = today;
        }

        // Load from localStorage
        function loadSales() {
            const saved = localStorage.getItem('dsrSales');
            if (saved) {
                salesData = JSON.parse(saved);
            }
            renderSales();
        }

        function saveSales() {
            localStorage.setItem('dsrSales', JSON.stringify(salesData));
            renderSales();
        }

        function addSale() {
            const date = document.getElementById('saleDate').value;
            const product = document.getElementById('product').value.trim();
            const qty = parseInt(document.getElementById('qtySold').value) || 0;
            const amount = parseFloat(document.getElementById('saleAmount').value) || 0;

            if (!date || !product || qty <= 0 || amount <= 0) {
                alert('Please fill all fields with valid values');
                return;
            }

            salesData.push({ date, product, qty, amount, id: Date.now() });
            saveSales();
            
            document.getElementById('product').value = '';
            document.getElementById('qtySold').value = '';
            document.getElementById('saleAmount').value = '';
            setTodayDate();
        }

        function deleteSale(id) {
            salesData = salesData.filter(item => item.id !== id);
            saveSales();
        }

        function clearAllSales() {
            if (confirm('Clear all sales records?')) {
                salesData = [];
                saveSales();
            }
        }

        function renderSales() {
            const tbody = document.getElementById('salesTableBody');
            tbody.innerHTML = '';

            let totalQty = 0;
            let totalAmount = 0;

            salesData.forEach((item, idx) => {
                totalQty += item.qty;
                totalAmount += item.amount;
                
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="border-b border-white/40 hover:bg-white/20 transition">
                        <td class="py-3 px-4">${idx + 1}</td>
                        <td class="py-3 px-4 font-semibold">${item.date}</td>
                        <td class="py-3 px-4">${item.product}</td>
                        <td class="py-3 px-4 text-right font-bold">${item.qty}</td>
                        <td class="py-3 px-4 text-right font-bold">₹ ${item.amount.toFixed(2)}</td>
                        <td class="py-3 px-4 text-center">
                            <button onclick="deleteSale(${item.id})" class="text-red-500 hover:text-red-700 font-semibold">Delete</button>
                        </td>
                    </tr>
                `);
            });

            document.getElementById('totalTransactions').textContent = salesData.length;
            document.getElementById('totalQuantity').textContent = totalQty;
            document.getElementById('totalSales').textContent = `₹ ${totalAmount.toFixed(2)}`;
            
            const avgSale = salesData.length > 0 ? (totalAmount / salesData.length).toFixed(2) : '0.00';
            document.getElementById('avgSale').textContent = `₹ ${avgSale}`;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = saved ? saved === 'dark' : prefersDark;
            
            if (isDark) {
                document.body.classList.add('dark-mode');
            }
        }

        window.onload = function() {
            loadTheme();
            setTodayDate();
            loadSales();
        };
    </script>
</body>
</html>
